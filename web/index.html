<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>煤矿井下数字孪生系统</title>

    <style>
        body {
            margin: 0;
            overflow-y: auto;
            font-family: Arial;
        }

        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            background: #151a22;
            color: #d7dde6;
            padding: 14px;
            border-radius: 8px;
            font-family: Arial;
            font-size: 13px;

            max-height: 90vh;
            /* 限制最大高度 */
            overflow-y: auto;
            /* 面板内部滚动 */
        }

        .title {
            font-weight: bold;
            margin-bottom: 12px;
            color: #00d4ff;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2a3442;
        }

        .label {
            color: #8a94a6;
        }

        .value {
            color: #ffffff;
        }

        .btns {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .btns button {
            width: 48%;
            padding: 6px;
            background: #2a3442;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .btns button:hover {
            background: #3a475a;
        }

        .dashboard {
            margin-top: 12px;
        }

        .card {
            background: #1c2430;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
        }

        /* 状态灯 */
        .lamp {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }

        .online {
            background: #00ff88;
        }

        .offline {
            background: gray;
        }

        .run {
            background: #00ff88;
        }

        .stop {
            background: #888;
        }

        .alarm {
            background: red;
        }

        /* 温度条 */
        .gauge {
            position: relative;
            height: 12px;
            background: #2a3442;
            border-radius: 6px;
            margin-top: 6px;
        }

        #tempBar {
            height: 12px;
            width: 0%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            border-radius: 6px;
        }

        #tempText {
            font-size: 12px;
            margin-top: 6px;
            display: block;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>


</head>

<body>

    <div id="panel">

        <div class="title">设备监控中心</div>

        <div class="btns">
            <button id="editBtn" onclick="setEditMode()">编辑模式</button>
            <button id="runBtn" onclick="setRunMode()">运行模式</button>
        </div>

        <!-- 设备列表 -->
        <div class="card">
            <div class="label">设备列表</div>
            <div id="deviceList"></div>
        </div>

        <div class="row">
            <div class="label">网络状态</div>
            <div class="value"><span id="online">离线</span></div>
        </div>

        <div class="row">
            <div class="label">设备</div>
            <div class="value" id="deviceName">风机</div>
        </div>

        <div class="row">
            <div class="label">RPM</div>
            <div class="value"><span id="rpm">0</span></div>
        </div>

        <div class="row">
            <div class="label">环境温度</div>
            <div class="value"><span id="envTemp">0</span> ℃</div>
        </div>

        <div class="row">
            <div class="label">设备温度</div>
            <div class="value"><span id="fanTemp">0</span> ℃</div>
        </div>

        <div class="row">
            <div class="label">状态</div>
            <div class="value" id="deviceStatus">停止</div>
        </div>

        <div class="row">
            <div class="label">系统模式</div>
            <div class="value" id="systemMode">运行模式</div>
        </div>

        <div class="row">
            <div class="label">控制模式</div>
            <div class="value" id="deviceMode">-</div>
        </div>

        <div class="btns">
            <button onclick="start()">启动</button>
            <button onclick="stop()">停止</button>
        </div>

        <div class="btns">
            <button onclick="setManual()">手动模式</button>
            <button onclick="setAuto()">自动模式</button>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="label">设备管理</div>

                <div class="btns">
                    <button onclick="addFan()">添加风机</button>
                    <button onclick="addSensor()">添加传感器</button>
                </div>

                <div class="btns">
                    <button onclick="removeDevice()">删除设备</button>
                    <button onclick="clearDevices()">清空设备</button>
                </div>
            </div>

            <div class="card">
                <div class="label">状态灯</div>
                <div id="lamp" class="lamp offline"></div>
            </div>

            <div class="card">
                <div class="label">温度仪表</div>
                <div class="gauge">
                    <div id="tempBar"></div>
                    <span id="tempText">0℃</span>
                </div>
            </div>

            <div class="card">
                <div class="label">温度趋势</div>
                <div id="trendChart" style="width:100%;height:150px;"></div>
            </div>

        </div>


    </div>

    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
  }
}
</script>
    <script type="module">
        import * as THREE from "three";
        import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";
        import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js";

        let editMode = false;

        // 进入编辑模式
        window.setEditMode = function () {
            editMode = true;

            document.getElementById("systemMode").innerText = "布局编辑";

            updateModeUI();

            console.log("当前模式：编辑模式");
        };

        // 进入运行模式
        window.setRunMode = function () {
            editMode = false;

            document.getElementById("systemMode").innerText = "运行模式";

            updateModeUI();

            console.log("当前模式：运行模式");
        };

        // 按钮高亮
        function updateModeUI() {

            const editBtn = document.getElementById("editBtn");
            const runBtn = document.getElementById("runBtn");

            if (!editBtn || !runBtn) return;

            if (editMode) {
                editBtn.style.background = "#00d4ff";
                runBtn.style.background = "#2a3442";
            } else {
                runBtn.style.background = "#00d4ff";
                editBtn.style.background = "#2a3442";
            }
        }


        // 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x444444);
        scene.fog = new THREE.Fog(0x999999, 5, 80);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 鼠标点击检测（Raycaster）
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 当前选中的对象
        let selectedObject = null;

        // 拖拽控制变量
        let isDragging = false;
        let dragObject = null;

        // 加载纹理
        const textureLoader = new THREE.TextureLoader();

        const rockTexture = textureLoader.load('../textures/rock1.jpg');

        rockTexture.wrapS = THREE.RepeatWrapping;
        rockTexture.wrapT = THREE.RepeatWrapping;
        rockTexture.repeat.set(4, 2);

        const wallMaterial = new THREE.MeshStandardMaterial({
            map: rockTexture,
            side: THREE.DoubleSide
        });

        // 创建矿井巷道
        for (let i = -50; i <= 50; i += 20) {

            // 左墙
            const leftWall = new THREE.Mesh(
                new THREE.BoxGeometry(20, 4, 0.5),
                wallMaterial
            );
            leftWall.position.set(i, 2, -10);
            scene.add(leftWall);

            // 右墙
            const rightWall = new THREE.Mesh(
                new THREE.BoxGeometry(20, 4, 0.5),
                wallMaterial
            );
            rightWall.position.set(i, 2, 10);
            scene.add(rightWall);

            // 拱形顶部
            const arch = new THREE.Mesh(
                new THREE.CylinderGeometry(
                    10.5,  // 半径顶部
                    10.5,
                    22, // 巷道左右宽度
                    32, // 圆周分段数
                    1,
                    true,
                    0,
                    Math.PI
                ),
                wallMaterial
            );

            arch.rotation.z = Math.PI / 2;
            arch.position.set(i, 1, 0);

            scene.add(arch);


        }

        // 创建矿井地面
        for (let i = -50; i <= 50; i += 20) {

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({
                    map: rockTexture,
                    side: THREE.DoubleSide
                })
            );

            floor.rotation.x = Math.PI / 2;

            floor.position.set(i, 0, 0);

            scene.add(floor);
        }

        // 添加光源
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        // 环境光
        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);

        // 矿井灯光
        for (let i = -40; i <= 40; i += 8) {
            const lamp = new THREE.PointLight(0xffeeaa, 5, 60);
            lamp.position.set(i, 10.5, 0);
            scene.add(lamp);

            const bulb = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffee88 })
            );
            bulb.position.copy(lamp.position);
            scene.add(bulb);

        }

        // 加载设备模型
        const deviceModels = {};

        // 删除设备模型函数
        function removeModel(deviceId) {

            const device = deviceModels[deviceId];

            if (device) {

                // 1 从 Three.js 场景删除
                scene.remove(device.model);

                // 2 释放内存（防止卡顿）
                device.model.traverse(child => {
                    if (child.isMesh) {
                        child.geometry.dispose();

                        if (child.material) {
                            if (Array.isArray(child.material)) {
                                child.material.forEach(m => m.dispose());
                            } else {
                                child.material.dispose();
                            }
                        }
                    }
                });

                // 3 删除记录
                delete deviceModels[deviceId];

                console.log("模型已删除:", deviceId);
            }
        }

        // 设备加载注册表
        const deviceLoaders = {
            fan: loadFan,
            sensor: loadSensor
        };

        // 根据设备ID加载不同模型，放在不同位置
        // 预设了两台风机
        function loadFan(deviceId, x, z) {

            const loader = new GLTFLoader();

            loader.load('../models/fan.glb', function (gltf) {

                const model = gltf.scene;
                const fanParts = [];

                // 找叶片
                model.traverse(child => {
                    if (child.isMesh && ["Object_40"].includes(child.name)) {
                        fanParts.push(child);
                    }
                });

                // 缩放
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const scale = 2 / Math.max(size.x, size.y, size.z);
                model.scale.set(scale, scale, scale);

                // 不同设备不同位置
                model.position.set(x, 0, z);

                scene.add(model);

                // 存入设备模型表
                deviceModels[deviceId] = {
                    model: model,
                    fanParts: fanParts,
                    rpm: 0,

                    duct: null,   // 风筒引用
                    arrow: null   // 风流箭头
                };

                // 等模型完全进入场景后，再创建风筒和箭头
                setTimeout(() => {
                    createFanDuct(deviceId);
                    createFanArrow(deviceId);
                }, 100);
                console.log("模型加载完成:", deviceId);
            });
        }

        // 创建风筒（简单的圆柱体分段组成），绑定到风机位置
        function createFanDuct(deviceId) {

            const device = deviceModels[deviceId];
            if (!device) return;

            const fanPos = device.model.position;

            const length = 30;          // 风筒长度（工程建议 20~50）
            const radius = 0.5;
            const segmentCount = 20;
            const segmentLength = length / segmentCount;

            const group = new THREE.Group();

            let offset = 0;

            for (let i = 0; i < segmentCount; i++) {

                const geometry = new THREE.CylinderGeometry(
                    radius,
                    radius,
                    segmentLength,
                    16,
                    1,
                    true
                );

                const texture = new THREE.TextureLoader().load('../textures/rock1.jpg');

                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(10, 1);

                const material = new THREE.MeshStandardMaterial({
                    map: texture,
                    transparent: true,
                    side: THREE.DoubleSide
                });

                const segment = new THREE.Mesh(geometry, material);

                // 横向（沿X轴）
                segment.rotation.z = Math.PI / 2;

                // 从风机位置向前延伸
                segment.position.x = offset + segmentLength / 2;

                offset += segmentLength;

                group.add(segment);

                segment.userData.flowTexture = texture;
            }

            // 风筒起点 = 风机位置
            group.position.set(fanPos.x, 2.8, fanPos.z);

            scene.add(group);

            // 绑定到风机
            device.duct = group;

            console.log("风筒已创建:", deviceId);
        }

        function createFanArrow(deviceId) {

            const device = deviceModels[deviceId];
            if (!device) return;

            const geometry = new THREE.ConeGeometry(0.2, 0.8, 16);

            const material = new THREE.MeshBasicMaterial({
                color: 0x00ffff
            });

            const arrow = new THREE.Mesh(geometry, material);

            // 指向X轴正方向（风流方向）
            arrow.rotation.z = -Math.PI / 2;

            // 初始位置 = 风机位置
            arrow.position.copy(device.model.position);

            scene.add(arrow);

            // 绑定到风机
            device.arrow = arrow;

            // 风流移动位置
            device.flowPos = 0;

            console.log("风流箭头已创建:", deviceId);
        }

        // 传感器模型相对简单，直接用一个立方体表示
        function loadSensor(deviceId, x, z) {

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: 0x00aaff });

            const cube = new THREE.Mesh(geometry, material);

            cube.position.set(x, 0.5, z);

            scene.add(cube);

            deviceModels[deviceId] = {
                model: cube,
                rpm: 0
            };

            console.log("Sensor加载完成:", deviceId);
        }


        // 相机位置
        camera.position.set(0, 2, 5);

        let globalArrow;
        let globalFlowPos = 0;   // 从风筒起点开始

        function createGlobalArrow() {

            const geometry = new THREE.ConeGeometry(0.2, 0.8, 16);

            const material = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                transparent: true
            });

            globalArrow = new THREE.Mesh(geometry, material);

            // 旋转箭头指向右侧（沿X轴）
            globalArrow.rotation.z = -Math.PI / 2;

            // 初始位置在巷道左侧，稍微抬高一些
            globalArrow.position.set(-50, 2.8, 0);

            scene.add(globalArrow);
        }

        // 创建一次
        createGlobalArrow();

        // 设备转速
        let rpm = 1000;
        let status = "stop";
        // 多设备数据池
        const deviceStore = {};
        let currentDevice = null;

        let alarmBlink = false;
        let temperature = 0;

        // WebSocket连接
        const socket = new WebSocket("ws://localhost:3000");

        // 第一人称控制变量
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let moveUp = false;
        let moveDown = false;

        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();

        let yaw = 0;   // 左右旋转
        let pitch = 0; // 上下视角

        const speed = 0.1;
        const mouseSensitivity = 0.002;

        // 点击锁定鼠标
        document.addEventListener("click", () => {
            document.body.requestPointerLock();
        });

        // 鼠标移动控制视角
        document.addEventListener("mousemove", (event) => {

            // 没锁定鼠标就不执行
            if (document.pointerLockElement !== document.body) return;

            yaw -= event.movementX * mouseSensitivity;
            pitch -= event.movementY * mouseSensitivity;

            // 限制上下角度（防止翻转）
            pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));

            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

        });


        // 按键按下
        document.addEventListener("keydown", (event) => {

            switch (event.code) {
                case "KeyW": moveForward = true; break;
                case "KeyS": moveBackward = true; break;
                case "KeyA": moveLeft = true; break;
                case "KeyD": moveRight = true; break;
                case "Space": moveUp = true; break;
                case "KeyJ": moveDown = true; break;
            }

        });

        // 按键松开
        document.addEventListener("keyup", (event) => {

            switch (event.code) {
                case "KeyW": moveForward = false; break;
                case "KeyS": moveBackward = false; break;
                case "KeyA": moveLeft = false; break;
                case "KeyD": moveRight = false; break;
                case "Space": moveUp = false; break;
                case "KeyJ": moveDown = false; break;
            }

        });

        socket.onopen = function () {
            console.log("网页已连接服务器");

            // 更新在线状态
            document.getElementById("online").innerText = "在线";
            document.getElementById("online").style.color = "green";

            //关键：注册为网页客户端
            socket.send(JSON.stringify({
                type: "web"
            }));
        };

        // 连接断开处理
        socket.onclose = function () {
            console.log("连接断开");

            document.getElementById("online").innerText = "离线";
            document.getElementById("online").style.color = "red";
        };

        socket.onmessage = function (event) {

            const msg = JSON.parse(event.data);
            console.log("收到数据:", msg);

            console.log("msg内容:", msg);

            // 根据消息类型处理

            // 1 初始化设备列表和模型
            if (msg.type === "init") {

                renderDeviceList(msg.devices);

                // 动态加载模型
                msg.devices.forEach((d, index) => {

                    const loader = deviceLoaders[d.type];

                    if (loader) {
                        loader(d.deviceId, d.x, d.z);
                    } else {
                        console.warn("没有对应的loader:", d.type);
                    }
                });
            }

            // 2 接收设备当前状态，初始化设备数据池
            if (msg.type === "init_data") {

                msg.devices.forEach(d => {
                    if (d.data) {
                        deviceStore[d.deviceId] = d.data;
                    }
                });

                console.log("初始化设备状态:", deviceStore);
            }

            // 3 设备列表更新
            if (msg.type === "device_list_update") {

                renderDeviceList(msg.devices);

                msg.devices.forEach((d, index) => {

                    // 如果模型不存在才加载（防重复）
                    if (!deviceModels[d.deviceId]) {

                        const loader = deviceLoaders[d.type];

                        if (loader) {
                            loader(d.deviceId, d.x, d.z);
                        }
                    }
                });
            }

            // 4 实时数据更新
            if (msg.type === "device_update") {

                const { deviceId, data, x, z } = msg;

                console.log("更新位置:", deviceId, x, z);

                // 更新状态
                deviceStore[deviceId] = data;

                // 核心：更新模型位置
                const device = deviceModels[deviceId];

                if (device && x !== undefined && z !== undefined) {
                    device.model.position.set(x, device.model.position.y, z);
                }

                // 更新 UI
                if (deviceId === currentDevice) {
                    updateUI(data);
                }
            }

            // 5 删除设备
            if (msg.type === "remove_device") {

                const deviceId = msg.deviceId;

                console.log("删除设备模型:", deviceId);

                removeModel(deviceId);
            }
        };

        window.start = function () {

            socket.send(JSON.stringify({
                type: "control",
                deviceId: currentDevice,
                command: "start"
            }));
        }

        window.stop = function () {

            socket.send(JSON.stringify({
                type: "control",
                deviceId: currentDevice,
                command: "stop"
            }));
        }

        // 模式切换（手动）
        window.setManual = function () {
            socket.send(JSON.stringify({
                type: "control",
                deviceId: currentDevice,
                command: "manual"
            }));
        };
        // 模式切换（自动）
        window.setAuto = function () {
            socket.send(JSON.stringify({
                type: "control",
                deviceId: currentDevice,
                command: "auto"
            }));
        };

        // ================== 设备管理 ==================

        // 添加风机
        window.addFan = function () {
            socket.send(JSON.stringify({
                type: "add_device",
                deviceType: "fan"
            }));
        };

        // 添加传感器
        window.addSensor = function () {
            socket.send(JSON.stringify({
                type: "add_device",
                deviceType: "sensor"
            }));
        };

        // 删除当前设备
        window.removeDevice = function () {

            if (!currentDevice) {
                alert("请先选择设备");
                return;
            }

            socket.send(JSON.stringify({
                type: "remove_device",
                deviceId: currentDevice
            }));
        };

        // 清空全部设备
        window.clearDevices = function () {
            socket.send(JSON.stringify({
                type: "clear_devices"
            }));
        };


        // 闪烁定时器
        setInterval(function () {

            if (status === "alarm") {
                alarmBlink = !alarmBlink;
            }

        }, 500);

        // 动画循环函数
        function animate() {

            requestAnimationFrame(animate);

            // 方向计算
            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.y = Number(moveUp) - Number(moveDown);

            direction.normalize();

            // 前后移动（基于视角）
            if (moveForward || moveBackward) {
                camera.translateZ(-direction.z * speed);
            }

            // 左右移动
            if (moveLeft || moveRight) {
                camera.translateX(direction.x * speed);
            }

            // 上下移动
            if (moveUp || moveDown) {
                camera.position.y += direction.y * speed;
            }


            // 设备动画：风机旋转
            Object.keys(deviceModels).forEach(id => {

                const device = deviceModels[id];

                // 只有风机才有 fanParts
                if (device.fanParts) {
                    device.fanParts.forEach(part => {
                        part.rotation.y += device.rpm * 0.0001;
                    });
                }
            });

            updateMachineColor();

            // 每个风机的局部风流动画 
            Object.values(deviceModels).forEach(device => {

                if (device.arrow && device.duct) {

                    let speed = device.rpm * 0.00002;

                    device.flowPos += speed;

                    if (device.flowPos > 30) {
                        device.flowPos = 0;
                    }

                    // 风筒流动效果
                    device.arrow.position.x =
                        device.model.position.x + device.flowPos;

                    device.arrow.position.z =
                        device.model.position.z;

                    device.duct.children.forEach(segment => {

                        const tex = segment.userData.flowTexture;
                        if (!tex) return;

                        let flowSpeed = device.rpm * 0.00005;

                        tex.offset.y += flowSpeed;  // 关键：纹理移动
                    });
                }

            });


            // 选中高亮（黄色）
            if (selectedObject) {
                selectedObject.traverse(child => {
                    if (child.isMesh) {
                        child.material.color.set(0xffff00);
                    }
                });
            }
            renderer.render(scene, camera);

        }

        animate();

        // 鼠标点击事件处理
        window.addEventListener("click", onMouseClick);

        // 拖拽事件处理 鼠标摁下开始拖拽
        window.addEventListener("mousedown", (event) => {

            if (!editMode) return; // 核心限制

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(
                Object.values(deviceModels).map(d => d.model),
                true
            );

            if (intersects.length > 0) {

                let obj = intersects[0].object;

                // 找顶层模型
                while (obj.parent && obj.parent.type !== "Scene") {
                    obj = obj.parent;
                }

                dragObject = obj;
                isDragging = true;
            }
        });

        // 鼠标移动（拖拽中）
        window.addEventListener("mousemove", (event) => {

            if (!editMode || !isDragging || !dragObject) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // 与地面相交（y=0平面）
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const point = new THREE.Vector3();

            raycaster.ray.intersectPlane(plane, point);

            if (point) {
                dragObject.position.x = point.x;
                dragObject.position.z = point.z;
            }
        });

        // 鼠标松开（结束拖拽 + 同步）
        window.addEventListener("mouseup", () => {

            if (!editMode || !isDragging || !dragObject) return;

            isDragging = false;

            // 找 deviceId
            let deviceId = null;

            Object.keys(deviceModels).forEach(id => {
                if (deviceModels[id].model === dragObject) {
                    deviceId = id;
                }
            });

            if (deviceId) {

                const pos = dragObject.position;

                console.log("发送新位置:", deviceId, pos.x, pos.z);

                // 发送给服务器
                socket.send(JSON.stringify({
                    type: "update_position",
                    deviceId: deviceId,
                    x: pos.x,
                    z: pos.z
                }));
            }

            dragObject = null;
        });

        // 点击检测函数
        function onMouseClick(event) {

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(
                Object.values(deviceModels).map(d => d.model),
                true
            );

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;

                // 找设备ID
                let selectedDeviceId = null;

                Object.keys(deviceModels).forEach(id => {
                    let obj = clickedMesh;

                    while (obj) {
                        if (obj === deviceModels[id].model) {
                            selectedDeviceId = id;
                            break;
                        }
                        obj = obj.parent;
                    }
                });

                if (selectedDeviceId) {

                    const device = deviceModels[selectedDeviceId];

                    // 高亮选中
                    selectedObject = device.model;

                    selectDevice(selectedDeviceId);
                }
            }

        }

        const chart = echarts.init(document.getElementById("trendChart"));

        let chartData = [];

        function updateChart(value) {

            const now = Date.now();

            chartData.push([now, value]);

            if (chartData.length > 20) {
                chartData.shift();
            }

            chart.setOption({
                grid: {
                    left: "10%",     // 给 y轴留空间
                    right: "5%",
                    top: 20,
                    bottom: 50,      // 给 x轴留空间
                    containLabel: true
                },

                xAxis: {
                    type: "time",
                    boundaryGap: false,
                    axisLabel: {
                        hideOverlap: true
                    },
                    axisLine: {
                        show: true
                    }
                },

                yAxis: {
                    type: "value",
                    min: 0,
                    max: 100,
                    axisLabel: {
                        margin: 10   // 防止贴边
                    }
                },

                series: [{
                    type: "line",
                    data: chartData,
                    smooth: true,
                    showSymbol: false,
                    clip: true,
                    lineStyle: {
                        width: 2
                    },
                    areaStyle: {
                        opacity: 0.1
                    }
                }]
            });

        }


        function renderDeviceList(devices) {

            const container = document.getElementById("deviceList");
            container.innerHTML = "";

            devices.forEach(d => {

                const { deviceId, type } = d;

                const item = document.createElement("div");
                item.innerText = `${deviceId} (${type})`;

                item.style.cursor = "pointer";
                item.style.padding = "4px";

                item.onclick = () => selectDevice(deviceId);

                container.appendChild(item);
            });
        }


        function selectDevice(deviceId) {

            currentDevice = deviceId;

            document.getElementById("deviceName").innerText = deviceId;

            const data = deviceStore[deviceId];

            if (data) {
                updateUI(data);
            }

            console.log("当前设备:", deviceId);
        }

        function updateUI(data) {

            const rpm = data.rpm;
            const temperature = data.temperature;
            const temp = temperature;

            // 状态灯
            const lamp = document.getElementById("lamp");
            // 先清空所有状态
            lamp.className = "lamp";

            // 区分设备类型
            if (currentDevice && currentDevice.startsWith("sensor")) {

                // 传感器默认正常（绿色）
                lamp.classList.add("run");

            } else {

                // 风机才使用状态
                if (data.status === "run") {
                    lamp.classList.add("run");
                } else if (data.status === "stop") {
                    lamp.classList.add("stop");
                } else if (data.status === "alarm") {
                    lamp.classList.add("alarm");
                }

            }


            // 设备温度（fan）
            if (data.temperature !== undefined) {
                document.getElementById("fanTemp").innerText = data.temperature;
            }

            // 固定使用 sensor1 作为环境温度
            const sensorData = deviceStore["sensor1"];

            // 温度条改为环境温度
            if (sensorData) {
                document.getElementById("tempText").innerText =
                    sensorData.temperature + "℃";

                document.getElementById("tempBar").style.width =
                    Math.min(sensorData.temperature, 100) + "%";
            }

            // UI 上显示环境温度
            if (sensorData) {
                document.getElementById("envTemp").innerText = sensorData.temperature;
            }

            // 图表用环境温度
            if (sensorData) {
                updateChart(sensorData.temperature);
            }

            // 状态
            status = data.status;
            // 区分设备类型
            if (currentDevice && currentDevice.startsWith("sensor")) {

                // 传感器状态统一显示
                document.getElementById("deviceStatus").innerText = "正常";

            } else {

                // 风机状态
                document.getElementById("deviceStatus").innerText =
                    status === "run" ? "运行" :
                        status === "stop" ? "停止" : "报警";

            }
            // 模式
            if (data.mode) {
                document.getElementById("deviceMode").innerText =
                    data.mode === "auto" ? "自动" : "手动";
            }

            if (rpm !== undefined) {
                document.getElementById("rpm").innerText = rpm;
            } else {
                document.getElementById("rpm").innerText = "-";
            }

            // 更新设备模型数据
            if (currentDevice && deviceModels[currentDevice]) {

                if (data.rpm !== undefined) {
                    deviceModels[currentDevice].rpm = data.rpm;
                }

                if (data.status !== undefined) {
                    deviceModels[currentDevice].status = data.status; // 将状态存入设备模型数据中
                }

            }
        }

        // 更新设备颜色
        function updateMachineColor() {

            Object.keys(deviceModels).forEach(id => {

                const device = deviceModels[id];

                device.model.traverse(child => {

                    if (child.isMesh) {

                        if (device.status === "run") {
                            child.material.color.set(0x00ff00); // 绿色
                        }
                        else if (device.status === "stop") {
                            child.material.color.set(0x888888); // 灰色
                        }
                        else if (device.status === "alarm") {
                            child.material.color.set(0xff0000); // 红色
                        }

                    }

                });

            });
        }
    </script>

</body>

</html>
