<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>煤矿井下数字孪生系统</title>

    <style>
        body {
            margin: 0;
            overflow-y: auto;
            font-family: Arial;
        }

        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            background: #151a22;
            color: #d7dde6;
            padding: 14px;
            border-radius: 8px;
            font-family: Arial;
            font-size: 13px;

            max-height: 90vh;
            /* 限制最大高度 */
            overflow-y: auto;
            /* 面板内部滚动 */
        }

        .title {
            font-weight: bold;
            margin-bottom: 12px;
            color: #00d4ff;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2a3442;
        }

        .label {
            color: #8a94a6;
        }

        .value {
            color: #ffffff;
        }

        .btns {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .btns button {
            width: 48%;
            padding: 6px;
            background: #2a3442;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .btns button:hover {
            background: #3a475a;
        }

        .dashboard {
            margin-top: 12px;
        }

        .card {
            background: #1c2430;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
        }

        /* 状态灯 */
        .lamp {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }

        .online {
            background: #00ff88;
        }

        .offline {
            background: gray;
        }

        .run {
            background: #00ff88;
        }

        .stop {
            background: #888;
        }

        .alarm {
            background: red;
        }

        /* 温度条 */
        .gauge {
            position: relative;
            height: 12px;
            background: #2a3442;
            border-radius: 6px;
            margin-top: 6px;
        }

        #tempBar {
            height: 12px;
            width: 0%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            border-radius: 6px;
        }

        #tempText {
            font-size: 12px;
            margin-top: 6px;
            display: block;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>


</head>

<body>

    <div id="panel">

        <div class="title">设备监控中心</div>


        <!-- 设备列表 -->
        <div class="card">
            <div class="label">设备列表</div>
            <div id="deviceList"></div>
        </div>

        <div class="row">
            <div class="label">网络状态</div>
            <div class="value"><span id="online">离线</span></div>
        </div>

        <div class="row">
            <div class="label">设备</div>
            <div class="value" id="deviceName">风机</div>
        </div>

        <div class="row">
            <div class="label">RPM</div>
            <div class="value"><span id="rpm">0</span></div>
        </div>

        <div class="row">
            <div class="label">环境温度</div>
            <div class="value"><span id="envTemp">0</span> ℃</div>
        </div>

        <div class="row">
            <div class="label">设备温度</div>
            <div class="value"><span id="fanTemp">0</span> ℃</div>
        </div>

        <div class="row">
            <div class="label">状态</div>
            <div class="value" id="deviceStatus">停止</div>
        </div>

        <div class="row">
            <div class="label">模式</div>
            <div class="value" id="modeText">-</div>
        </div>

        <div class="btns">
            <button onclick="start()">启动</button>
            <button onclick="stop()">停止</button>
        </div>

        <div class="btns">
            <button onclick="setManual()">手动模式</button>
            <button onclick="setAuto()">自动模式</button>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="label">设备管理</div>

                <div class="btns">
                    <button onclick="addFan()">➕ 风机</button>
                    <button onclick="addSensor()">➕ 传感器</button>
                </div>

                <div class="btns">
                    <button onclick="removeDevice()">❌ 删除</button>
                    <button onclick="clearDevices()">🧹 清空</button>
                </div>
            </div>

            <div class="card">
                <div class="label">状态灯</div>
                <div id="lamp" class="lamp offline"></div>
            </div>

            <div class="card">
                <div class="label">温度仪表</div>
                <div class="gauge">
                    <div id="tempBar"></div>
                    <span id="tempText">0℃</span>
                </div>
            </div>

            <div class="card">
                <div class="label">温度趋势</div>
                <div id="trendChart" style="width:100%;height:150px;"></div>
            </div>

        </div>


    </div>

    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
  }
}
</script>
    <script type="module">
        import * as THREE from "three";
        import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";
        import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js";

        // 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x444444);
        scene.fog = new THREE.Fog(0x999999, 5, 80);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 鼠标点击检测（Raycaster）
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 当前选中的对象
        let selectedObject = null;

        // 添加轨道控制器
        const controls = new OrbitControls(camera, renderer.domElement);

        // 启用阻尼效果
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 加载纹理
        const textureLoader = new THREE.TextureLoader();

        const rockTexture = textureLoader.load('../textures/rock1.jpg');

        rockTexture.wrapS = THREE.RepeatWrapping;
        rockTexture.wrapT = THREE.RepeatWrapping;
        rockTexture.repeat.set(4, 2);

        const wallMaterial = new THREE.MeshStandardMaterial({
            map: rockTexture,
            side: THREE.DoubleSide
        });

        // 创建矿井巷道
        for (let i = -50; i <= 50; i += 20) {

            // 左墙
            const leftWall = new THREE.Mesh(
                new THREE.BoxGeometry(20, 4, 0.5),
                wallMaterial
            );
            leftWall.position.set(i, 2, -10);
            scene.add(leftWall);

            // 右墙
            const rightWall = new THREE.Mesh(
                new THREE.BoxGeometry(20, 4, 0.5),
                wallMaterial
            );
            rightWall.position.set(i, 2, 10);
            scene.add(rightWall);

            // 拱形顶部
            const arch = new THREE.Mesh(
                new THREE.CylinderGeometry(
                    10.5,  // 半径顶部
                    10.5,
                    22, // 巷道左右宽度
                    32, // 圆周分段数
                    1,
                    true,
                    0,
                    Math.PI
                ),
                wallMaterial
            );

            arch.rotation.z = Math.PI / 2;
            arch.position.set(i, 1, 0);

            scene.add(arch);


        }

        // 创建矿井地面
        for (let i = -50; i <= 50; i += 20) {

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({
                    map: rockTexture,
                    side: THREE.DoubleSide
                })
            );

            floor.rotation.x = Math.PI / 2;

            floor.position.set(i, 0, 0);

            scene.add(floor);
        }

        // 添加光源
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        // 环境光
        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);

        // 矿井灯光
        for (let i = -40; i <= 40; i += 8) {
            const lamp = new THREE.PointLight(0xffeeaa, 5, 60);
            lamp.position.set(i, 10.5, 0);
            scene.add(lamp);

            const bulb = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffee88 })
            );
            bulb.position.copy(lamp.position);
            scene.add(bulb);

        }

        // 加载设备模型
        const deviceModels = {};

        // 删除设备模型函数
        function removeModel(deviceId) {

            const device = deviceModels[deviceId];

            if (device) {

                // 1 从 Three.js 场景删除
                scene.remove(device.model);

                // 2 释放内存（防止卡顿）
                device.model.traverse(child => {
                    if (child.isMesh) {
                        child.geometry.dispose();

                        if (child.material) {
                            if (Array.isArray(child.material)) {
                                child.material.forEach(m => m.dispose());
                            } else {
                                child.material.dispose();
                            }
                        }
                    }
                });

                // 3 删除记录
                delete deviceModels[deviceId];

                console.log("模型已删除:", deviceId);
            }
        }

        // 设备加载注册表
        const deviceLoaders = {
            fan: loadFan,
            sensor: loadSensor
        };

        // 根据设备ID加载不同模型，放在不同位置
        // 预设了两台风机
        function loadFan(deviceId, positionX) {

            const loader = new GLTFLoader();

            loader.load('../models/fan.glb', function (gltf) {

                const model = gltf.scene;
                const fanParts = [];

                // 找叶片
                model.traverse(child => {
                    if (child.isMesh && ["Object_40"].includes(child.name)) {
                        fanParts.push(child);
                    }
                });

                // 缩放
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const scale = 2 / Math.max(size.x, size.y, size.z);
                model.scale.set(scale, scale, scale);

                // 不同设备不同位置
                model.position.set(positionX, 0, 0);

                scene.add(model);

                // 存入设备模型表
                deviceModels[deviceId] = {
                    model: model,
                    fanParts: fanParts,
                    rpm: 0
                };

                console.log("模型加载完成:", deviceId);
            });
        }

        // 传感器模型相对简单，直接用一个立方体表示
        function loadSensor(deviceId, positionX) {

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: 0x00aaff });

            const cube = new THREE.Mesh(geometry, material);

            cube.position.set(positionX, 0.5, 0);

            scene.add(cube);

            deviceModels[deviceId] = {
                model: cube,
                rpm: 0
            };

            console.log("Sensor加载完成:", deviceId);
        }


        // 相机位置
        camera.position.set(0, 3, 12);
        camera.lookAt(0, 2, 0);

        // 设备转速
        let rpm = 1000;
        let status = "stop";
        // 多设备数据池
        const deviceStore = {};
        let currentDevice = null;

        let alarmBlink = false;
        let temperature = 0;
        const socket = new WebSocket("ws://localhost:3000");

        socket.onopen = function () {
            console.log("网页已连接服务器");

            // 更新在线状态
            document.getElementById("online").innerText = "在线";
            document.getElementById("online").style.color = "green";

            //关键：注册为网页客户端
            socket.send(JSON.stringify({
                type: "web"
            }));
        };

        // 连接断开处理
        socket.onclose = function () {
            console.log("连接断开");

            document.getElementById("online").innerText = "离线";
            document.getElementById("online").style.color = "red";
        };

        socket.onmessage = function (event) {

            const msg = JSON.parse(event.data);
            console.log("收到数据:", msg);

            // 根据消息类型处理

            // 1 初始化设备列表和模型
            if (msg.type === "init") {

                renderDeviceList(msg.devices);

                // 动态加载模型
                msg.devices.forEach((d, index) => {

                    const loader = deviceLoaders[d.type];

                    if (loader) {
                        loader(d.deviceId, index * 10 - 10);
                    } else {
                        console.warn("没有对应的loader:", d.type);
                    }
                });
            }

            // 2 接收设备当前状态，初始化设备数据池
            if (msg.type === "init_data") {

                msg.devices.forEach(d => {
                    if (d.data) {
                        deviceStore[d.deviceId] = d.data;
                    }
                });

                console.log("初始化设备状态:", deviceStore);
            }

            // 3 设备列表更新
            if (msg.type === "device_list_update") {

                renderDeviceList(msg.devices);

                msg.devices.forEach((d, index) => {

                    // 如果模型不存在才加载（防重复）
                    if (!deviceModels[d.deviceId]) {

                        const loader = deviceLoaders[d.type];

                        if (loader) {
                            loader(d.deviceId, index * 10 - 10);
                        }
                    }
                });
            }

            // 4 实时数据更新
            if (msg.type === "device_update") {

                const { deviceId, data } = msg;

                deviceStore[deviceId] = data;

                if (deviceId === currentDevice) {
                    updateUI(data);
                }
            }

            // 5 删除设备
            if (msg.type === "remove_device") {

                const deviceId = msg.deviceId;

                console.log("删除设备模型:", deviceId);

                removeModel(deviceId);
            }
        };

        window.start = function () {

            socket.send(JSON.stringify({
                type: "control",
                deviceId: currentDevice,
                command: "start"
            }));
        }

        window.stop = function () {

            socket.send(JSON.stringify({
                type: "control",
                deviceId: currentDevice,
                command: "stop"
            }));
        }

        // 模式切换（手动）
        window.setManual = function () {
            socket.send(JSON.stringify({
                type: "control",
                deviceId: currentDevice,
                command: "manual"
            }));
        };
        // 模式切换（自动）
        window.setAuto = function () {
            socket.send(JSON.stringify({
                type: "control",
                deviceId: currentDevice,
                command: "auto"
            }));
        };

        // ================== 设备管理 ==================

        // 添加风机
        window.addFan = function () {
            socket.send(JSON.stringify({
                type: "add_device",
                deviceType: "fan"
            }));
        };

        // 添加传感器
        window.addSensor = function () {
            socket.send(JSON.stringify({
                type: "add_device",
                deviceType: "sensor"
            }));
        };

        // 删除当前设备
        window.removeDevice = function () {

            if (!currentDevice) {
                alert("请先选择设备");
                return;
            }

            socket.send(JSON.stringify({
                type: "remove_device",
                deviceId: currentDevice
            }));
        };

        // 清空全部设备
        window.clearDevices = function () {
            socket.send(JSON.stringify({
                type: "clear_devices"
            }));
        };


        // 闪烁定时器
        setInterval(function () {

            if (status === "alarm") {
                alarmBlink = !alarmBlink;
            }

        }, 500);

        // 动画循环函数
        function animate() {

            requestAnimationFrame(animate);

            controls.update();

            // 旋转风机叶片
            Object.keys(deviceModels).forEach(id => {

                const device = deviceModels[id];

                // 只有风机才有 fanParts
                if (device.fanParts) {
                    device.fanParts.forEach(part => {
                        part.rotation.y += device.rpm * 0.0001;
                    });
                }

            });

            updateMachineColor();
            // 选中高亮（黄色）
            if (selectedObject) {
                selectedObject.traverse(child => {
                    if (child.isMesh) {
                        child.material.color.set(0xffff00);
                    }
                });
            }
            renderer.render(scene, camera);

        }

        animate();

        // 鼠标点击事件处理
        window.addEventListener("click", onMouseClick);

        // 点击检测函数
        function onMouseClick(event) {

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(
                Object.values(deviceModels).map(d => d.model),
                true
            );

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;

                // 找设备ID
                let selectedDeviceId = null;

                Object.keys(deviceModels).forEach(id => {
                    let obj = clickedMesh;

                    while (obj) {
                        if (obj === deviceModels[id].model) {
                            selectedDeviceId = id;
                            break;
                        }
                        obj = obj.parent;
                    }
                });

                // 高亮整机
                if (selectedDeviceId) {

                    const device = deviceModels[selectedDeviceId];

                    // 设置新选中对象
                    selectedObject = device.model;
                    // 选中设备后显示其状态，同步UI选中
                    selectDevice(selectedDeviceId);
                }
            }

        }

        const chart = echarts.init(document.getElementById("trendChart"));

        let chartData = [];

        function updateChart(value) {

            const now = Date.now();

            chartData.push([now, value]);

            if (chartData.length > 20) {
                chartData.shift();
            }

            chart.setOption({
                grid: {
                    left: "10%",     // 给 y轴留空间
                    right: "5%",
                    top: 20,
                    bottom: 50,      // 给 x轴留空间
                    containLabel: true
                },

                xAxis: {
                    type: "time",
                    boundaryGap: false,
                    axisLabel: {
                        hideOverlap: true
                    },
                    axisLine: {
                        show: true
                    }
                },

                yAxis: {
                    type: "value",
                    min: 0,
                    max: 100,
                    axisLabel: {
                        margin: 10   // 防止贴边
                    }
                },

                series: [{
                    type: "line",
                    data: chartData,
                    smooth: true,
                    showSymbol: false,
                    clip: true,
                    lineStyle: {
                        width: 2
                    },
                    areaStyle: {
                        opacity: 0.1
                    }
                }]
            });

        }


        function renderDeviceList(devices) {

            const container = document.getElementById("deviceList");
            container.innerHTML = "";

            devices.forEach(d => {

                const { deviceId, type } = d;

                const item = document.createElement("div");
                item.innerText = `${deviceId} (${type})`;

                item.style.cursor = "pointer";
                item.style.padding = "4px";

                item.onclick = () => selectDevice(deviceId);

                container.appendChild(item);
            });
        }


        function selectDevice(deviceId) {

            currentDevice = deviceId;

            document.getElementById("deviceName").innerText = deviceId;

            const data = deviceStore[deviceId];

            if (data) {
                updateUI(data);
            }

            console.log("当前设备:", deviceId);
        }

        function updateUI(data) {

            const rpm = data.rpm;
            const temperature = data.temperature;
            const temp = temperature;

            // 状态灯
            const lamp = document.getElementById("lamp");
            // 先清空所有状态
            lamp.className = "lamp";

            // 区分设备类型
            if (currentDevice && currentDevice.startsWith("sensor")) {

                // 传感器默认正常（绿色）
                lamp.classList.add("run");

            } else {

                // 风机才使用状态
                if (data.status === "run") {
                    lamp.classList.add("run");
                } else if (data.status === "stop") {
                    lamp.classList.add("stop");
                } else if (data.status === "alarm") {
                    lamp.classList.add("alarm");
                }

            }


            // 设备温度（fan）
            if (data.temperature !== undefined) {
                document.getElementById("fanTemp").innerText = data.temperature;
            }

            // 固定使用 sensor1 作为环境温度
            const sensorData = deviceStore["sensor1"];

            // 温度条改为环境温度
            if (sensorData) {
                document.getElementById("tempText").innerText =
                    sensorData.temperature + "℃";

                document.getElementById("tempBar").style.width =
                    Math.min(sensorData.temperature, 100) + "%";
            }

            // UI 上显示环境温度
            if (sensorData) {
                document.getElementById("envTemp").innerText = sensorData.temperature;
            }

            // 图表用环境温度
            if (sensorData) {
                updateChart(sensorData.temperature);
            }

            // 状态
            status = data.status;
            // 区分设备类型
            if (currentDevice && currentDevice.startsWith("sensor")) {

                // 传感器状态统一显示
                document.getElementById("deviceStatus").innerText = "正常";

            } else {

                // 风机状态
                document.getElementById("deviceStatus").innerText =
                    status === "run" ? "运行" :
                        status === "stop" ? "停止" : "报警";

            }
            // 模式
            if (data.mode) {
                document.getElementById("modeText").innerText =
                    data.mode === "auto" ? "自动" : "手动";
            }

            if (rpm !== undefined) {
                document.getElementById("rpm").innerText = rpm;
            } else {
                document.getElementById("rpm").innerText = "-";
            }

            // 更新设备模型数据
            if (currentDevice && deviceModels[currentDevice]) {

                if (data.rpm !== undefined) {
                    deviceModels[currentDevice].rpm = data.rpm;
                }

                if (data.status !== undefined) {
                    deviceModels[currentDevice].status = data.status; // 将状态存入设备模型数据中
                }

            }
        }

        // 更新设备颜色
        function updateMachineColor() {

            Object.keys(deviceModels).forEach(id => {

                const device = deviceModels[id];

                device.model.traverse(child => {

                    if (child.isMesh) {

                        if (device.status === "run") {
                            child.material.color.set(0x00ff00); // 绿色
                        }
                        else if (device.status === "stop") {
                            child.material.color.set(0x888888); // 灰色
                        }
                        else if (device.status === "alarm") {
                            child.material.color.set(0xff0000); // 红色
                        }

                    }

                });

            });
        }
    </script>

</body>

</html>
