<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>煤矿数字孪生系统</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
        }

        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 10px;
            border-radius: 5px;
        }
    </style>

</head>

<body>

    <div id="panel">
        <button onclick="start()">启动设备</button>
        <button onclick="stop()">停止设备</button>
        <br><br>
        设备转速: <span id="rpm">1000</span> RPM

        <br><br>

        <b>设备信息</b>
        <br>
        名称: <span id="deviceName">风机</span>
        <br>
        转速: <span id="deviceRPM">0</span>
        <br>
        状态: <span id="deviceStatus">停止</span>
    </div>

    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
  }
}
</script>
    <script type="module">
        import * as THREE from "three";
        import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";
        import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js";

        // 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x444444);
        scene.fog = new THREE.Fog(0x999999, 5, 80);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 鼠标点击检测（Raycaster）
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 当前选中的对象
        let selectedObject = null;

        // 添加轨道控制器
        const controls = new OrbitControls(camera, renderer.domElement);

        // 启用阻尼效果
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 加载纹理
        const textureLoader = new THREE.TextureLoader();

        const rockTexture = textureLoader.load('../textures/rock1.jpg');

        rockTexture.wrapS = THREE.RepeatWrapping;
        rockTexture.wrapT = THREE.RepeatWrapping;
        rockTexture.repeat.set(4, 2);

        const wallMaterial = new THREE.MeshStandardMaterial({
            map: rockTexture,
            side: THREE.DoubleSide
        });

        // 创建矿井巷道
        for (let i = -50; i <= 50; i += 20) {

            // 左墙
            const leftWall = new THREE.Mesh(
                new THREE.BoxGeometry(20, 4, 0.5),
                wallMaterial
            );
            leftWall.position.set(i, 2, -10);
            scene.add(leftWall);

            // 右墙
            const rightWall = new THREE.Mesh(
                new THREE.BoxGeometry(20, 4, 0.5),
                wallMaterial
            );
            rightWall.position.set(i, 2, 10);
            scene.add(rightWall);

            // 拱形顶部
            const arch = new THREE.Mesh(
                new THREE.CylinderGeometry(
                    10.5,  // 半径顶部
                    10.5,
                    22, // 巷道左右宽度
                    32, // 圆周分段数
                    1,
                    true,
                    0,
                    Math.PI
                ),
                wallMaterial
            );

            arch.rotation.z = Math.PI / 2;
            arch.position.set(i, 1, 0);

            scene.add(arch);


        }

        // 创建矿井地面
        for (let i = -50; i <= 50; i += 20) {

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({
                    map: rockTexture,
                    side: THREE.DoubleSide
                })
            );

            floor.rotation.x = Math.PI / 2;

            floor.position.set(i, 0, 0);

            scene.add(floor);
        }

        // 添加光源
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        // 环境光
        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);

        // 矿井灯光
        for (let i = -40; i <= 40; i += 8) {
            const lamp = new THREE.PointLight(0xffeeaa, 5, 60);
            lamp.position.set(i, 10.5, 0);
            scene.add(lamp);

            const bulb = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffee88 })
            );
            bulb.position.copy(lamp.position);
            scene.add(bulb);

        }

        // 加载3D模型
        let machine;
        //let fanPart = null;
        let fanParts = [];

        const loader = new GLTFLoader();

        loader.load('../models/fan.glb', function (gltf) {

            machine = gltf.scene;

            // 输出所有 Mesh 名称，方便确认叶片
            machine.traverse(child => {
                if (child.isMesh) console.log("Mesh:", child.name);
            });

            // 根据名称选中叶片
            machine.traverse(child => {
                if (child.isMesh && ["Object_40"].includes(child.name)) {
                    fanParts.push(child);
                    console.log("选中叶片:", child.name);
                }
            });

            machine.traverse(child => {
                if (child.isMesh) {
                    console.log(child.name, child.geometry.attributes.position.count);
                }
            });


            // 计算包围盒
            const box = new THREE.Box3().setFromObject(machine);
            const size = box.getSize(new THREE.Vector3());

            // 获取最大尺寸
            const maxDim = Math.max(size.x, size.y, size.z);

            // 计算缩放比例
            const scale = 2 / maxDim;

            machine.scale.set(scale, scale, scale);

            // 放在地面上
            machine.position.set(0, 0, 0);

            scene.add(machine);

        });

        // 相机位置
        camera.position.set(0, 3, 12);
        camera.lookAt(0, 2, 0);

        // 设备转速
        let rpm = 1000;
        let status = "stop";
        let alarmBlink = false;
        const socket = new WebSocket("ws://localhost:3000");

        socket.onopen = function () {
            console.log("网页已连接服务器");

            //关键：注册为网页客户端
            socket.send(JSON.stringify({
                type: "web"
            }));
        };

        socket.onmessage = function (event) {

            const data = JSON.parse(event.data);

            if (data.type === "status" && data.deviceId === "fan1") {

                rpm = data.rpm;

                if (rpm > 0) {
                    status = "run";
                } else {
                    status = "stop";
                }

                document.getElementById("rpm").innerText = rpm;

            }

        };

        window.start = function () {

            console.log("点击了启动按钮");
            const msg = {
                type: "control",
                deviceId: "fan1",
                command: "start"
            };

            console.log("准备发送:", msg);

            socket.send(JSON.stringify(msg));

        }

        window.stop = function () {

            socket.send(JSON.stringify({
                type: "control",
                deviceId: "fan1",
                command: "stop"
            }));

        }

        // 更新设备颜色
        function updateMachineColor() {

            if (!machine) return;

            machine.traverse(function (child) {

                if (child.isMesh) {

                    if (status === "run") {
                        child.material.color.set(0x00ff00);
                    }

                    if (status === "stop") {
                        child.material.color.set(0x888888);
                    }

                    if (status === "alarm") {

                        if (alarmBlink) {
                            child.material.color.set(0xff0000); // 红色
                        } else {
                            child.material.color.set(0x000000); // 黑色
                        }

                    }

                }

            });

        }

        // 闪烁定时器
        setInterval(function () {

            if (status === "alarm") {
                alarmBlink = !alarmBlink;
            }

        }, 500);

        // 动画循环函数
        function animate() {

            requestAnimationFrame(animate);

            controls.update();

            // 只旋转叶片
            if (fanParts.length > 0) {
                fanParts.forEach(part => {
                    part.rotation.y += rpm * 0.0001;
                });
            }


            // 更新设备颜色
            updateMachineColor();

            renderer.render(scene, camera);

        }

        animate();

        // 鼠标点击事件处理
        window.addEventListener("click", onMouseClick);

        // 点击检测函数
        function onMouseClick(event) {

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObject(machine, true);

            if (intersects.length > 0) {

                const clicked = intersects[0].object;

                // 恢复之前高亮
                if (selectedObject) {
                    selectedObject.material.color.set(0xffffff);
                }

                // 设置新的高亮
                selectedObject = clicked;
                selectedObject.material.color.set(0xff0000);

                // 更新设备信息
                document.getElementById("deviceName").innerText = "矿井风机";
                document.getElementById("deviceRPM").innerText = rpm;

                if (rpm > 0) {
                    document.getElementById("deviceStatus").innerText = "运行";
                } else {
                    document.getElementById("deviceStatus").innerText = "停止";
                }

            }

        }
    </script>

</body>

</html>
