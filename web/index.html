<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>煤矿数字孪生系统</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
        }

        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            background: #151a22;
            color: #d7dde6;
            padding: 14px;
            border-radius: 8px;
            font-family: Arial;
            font-size: 13px;
        }

        .title {
            font-weight: bold;
            margin-bottom: 12px;
            color: #00d4ff;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2a3442;
        }

        .label {
            color: #8a94a6;
        }

        .value {
            color: #ffffff;
        }

        .btns {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .btns button {
            width: 48%;
            padding: 6px;
            background: #2a3442;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .btns button:hover {
            background: #3a475a;
        }

        .dashboard {
            margin-top: 12px;
        }

        .card {
            background: #1c2430;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
        }

        /* 状态灯 */
        .lamp {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }

        .online {
            background: #00ff88;
        }

        .offline {
            background: gray;
        }

        .run {
            background: #00ff88;
        }

        .stop {
            background: #888;
        }

        .alarm {
            background: red;
        }

        /* 温度条 */
        .gauge {
            position: relative;
            height: 12px;
            background: #2a3442;
            border-radius: 6px;
            margin-top: 6px;
        }

        #gaugeFill {
            height: 12px;
            width: 0%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            border-radius: 6px;
        }

        #tempText {
            font-size: 12px;
            margin-top: 6px;
            display: block;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>


</head>

<body>

    <div id="panel">

        <div class="title">🏭 设备监控中心</div>

        <div class="row">
            <div class="label">网络状态</div>
            <div class="value"><span id="online">离线</span></div>
        </div>

        <div class="row">
            <div class="label">设备</div>
            <div class="value" id="deviceName">风机</div>
        </div>

        <div class="row">
            <div class="label">RPM</div>
            <div class="value"><span id="rpm">0</span></div>
        </div>

        <div class="row">
            <div class="label">温度</div>
            <div class="value"><span id="temp">0</span> ℃</div>
        </div>

        <div class="row">
            <div class="label">状态</div>
            <div class="value" id="deviceStatus">停止</div>
        </div>

        <div class="btns">
            <button onclick="start()">启动</button>
            <button onclick="stop()">停止</button>
        </div>

        <div class="dashboard">

            <div class="card">
                <div class="label">状态灯</div>
                <div id="lamp" class="lamp offline"></div>
            </div>

            <div class="card">
                <div class="label">温度仪表</div>
                <div class="gauge">
                    <div id="tempBar"></div>
                    <span id="tempText">0℃</span>
                </div>
            </div>

            <div class="card">
                <div class="label">温度趋势</div>
                <canvas id="trendChart"></canvas>
            </div>

        </div>


    </div>

    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
  }
}
</script>
    <script type="module">
        import * as THREE from "three";
        import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js";
        import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js";

        // 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x444444);
        scene.fog = new THREE.Fog(0x999999, 5, 80);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 鼠标点击检测（Raycaster）
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 当前选中的对象
        let selectedObject = null;

        // 添加轨道控制器
        const controls = new OrbitControls(camera, renderer.domElement);

        // 启用阻尼效果
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 加载纹理
        const textureLoader = new THREE.TextureLoader();

        const rockTexture = textureLoader.load('../textures/rock1.jpg');

        rockTexture.wrapS = THREE.RepeatWrapping;
        rockTexture.wrapT = THREE.RepeatWrapping;
        rockTexture.repeat.set(4, 2);

        const wallMaterial = new THREE.MeshStandardMaterial({
            map: rockTexture,
            side: THREE.DoubleSide
        });

        // 创建矿井巷道
        for (let i = -50; i <= 50; i += 20) {

            // 左墙
            const leftWall = new THREE.Mesh(
                new THREE.BoxGeometry(20, 4, 0.5),
                wallMaterial
            );
            leftWall.position.set(i, 2, -10);
            scene.add(leftWall);

            // 右墙
            const rightWall = new THREE.Mesh(
                new THREE.BoxGeometry(20, 4, 0.5),
                wallMaterial
            );
            rightWall.position.set(i, 2, 10);
            scene.add(rightWall);

            // 拱形顶部
            const arch = new THREE.Mesh(
                new THREE.CylinderGeometry(
                    10.5,  // 半径顶部
                    10.5,
                    22, // 巷道左右宽度
                    32, // 圆周分段数
                    1,
                    true,
                    0,
                    Math.PI
                ),
                wallMaterial
            );

            arch.rotation.z = Math.PI / 2;
            arch.position.set(i, 1, 0);

            scene.add(arch);


        }

        // 创建矿井地面
        for (let i = -50; i <= 50; i += 20) {

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({
                    map: rockTexture,
                    side: THREE.DoubleSide
                })
            );

            floor.rotation.x = Math.PI / 2;

            floor.position.set(i, 0, 0);

            scene.add(floor);
        }

        // 添加光源
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        // 环境光
        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);

        // 矿井灯光
        for (let i = -40; i <= 40; i += 8) {
            const lamp = new THREE.PointLight(0xffeeaa, 5, 60);
            lamp.position.set(i, 10.5, 0);
            scene.add(lamp);

            const bulb = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffee88 })
            );
            bulb.position.copy(lamp.position);
            scene.add(bulb);

        }

        // 加载3D模型
        let machine;
        //let fanPart = null;
        let fanParts = [];

        const loader = new GLTFLoader();

        loader.load('../models/fan.glb', function (gltf) {

            machine = gltf.scene;

            // 输出所有 Mesh 名称，方便确认叶片
            machine.traverse(child => {
                if (child.isMesh) console.log("Mesh:", child.name);
            });

            // 根据名称选中叶片
            machine.traverse(child => {
                if (child.isMesh && ["Object_40"].includes(child.name)) {
                    fanParts.push(child);
                    console.log("选中叶片:", child.name);
                }
            });

            machine.traverse(child => {
                if (child.isMesh) {
                    console.log(child.name, child.geometry.attributes.position.count);
                }
            });


            // 计算包围盒
            const box = new THREE.Box3().setFromObject(machine);
            const size = box.getSize(new THREE.Vector3());

            // 获取最大尺寸
            const maxDim = Math.max(size.x, size.y, size.z);

            // 计算缩放比例
            const scale = 2 / maxDim;

            machine.scale.set(scale, scale, scale);

            // 放在地面上
            machine.position.set(0, 0, 0);

            scene.add(machine);

        });

        // 相机位置
        camera.position.set(0, 3, 12);
        camera.lookAt(0, 2, 0);

        // 设备转速
        let rpm = 1000;
        let status = "stop";
        let alarmBlink = false;
        let temperature = 0;
        const socket = new WebSocket("ws://localhost:3000");

        socket.onopen = function () {
            console.log("网页已连接服务器");

            // 更新在线状态
            document.getElementById("online").innerText = "在线";
            document.getElementById("online").style.color = "green";

            //关键：注册为网页客户端
            socket.send(JSON.stringify({
                type: "web"
            }));
        };

        // 连接断开处理
        socket.onclose = function () {
            console.log("连接断开");

            document.getElementById("online").innerText = "离线";
            document.getElementById("online").style.color = "red";
        };

        socket.onmessage = function (event) {

            const data = JSON.parse(event.data);
            console.log("收到数据:", data); // 调试输出

            if (data.type === "status" && data.deviceId === "fan1") {

                rpm = data.data.rpm;
                temperature = data.data.temperature;

                const temp = temperature;

                // ===== 状态灯 =====
                const lamp = document.getElementById("lamp");

                lamp.className = "lamp";

                if (data.deviceId !== "fan1") return;

                if (data.data.rpm > 0) {
                    lamp.classList.add("run");
                } else {
                    lamp.classList.add("stop");
                }

                if (temp > 70) {
                    lamp.classList.add("alarm");
                }

                // ===== 温度条 =====
                document.getElementById("tempText").innerText = temp + "℃";

                const percent = Math.min(temp, 100);
                document.getElementById("tempBar").style.width = percent + "%";

                // ===== 趋势图 =====
                updateChart(temp);

                // 根据转速更新状态
                if (rpm > 0) {
                    status = "run";
                } else {
                    status = "stop";
                }

                // 报警逻辑
                if (temperature > 70) {
                    status = "alarm";
                }

                // UI状态同步（新增）
                if (status === "run") {
                    document.getElementById("deviceStatus").innerText = "运行";
                } else if (status === "stop") {
                    document.getElementById("deviceStatus").innerText = "停止";
                } else if (status === "alarm") {
                    document.getElementById("deviceStatus").innerText = "报警";
                }

                // 更新设备信息显示
                document.getElementById("rpm").innerText = rpm;
                // 新增：温度显示
                document.getElementById("temp").innerText = temperature;

            }

        };

        window.start = function () {

            console.log("点击了启动按钮");
            const msg = {
                type: "control",
                deviceId: "fan1",
                command: "start"
            };

            console.log("准备发送:", msg);

            socket.send(JSON.stringify(msg));

        }

        window.stop = function () {

            socket.send(JSON.stringify({
                type: "control",
                deviceId: "fan1",
                command: "stop"
            }));

        }

        // 更新设备颜色
        function updateMachineColor() {

            if (!machine) return;

            machine.traverse(function (child) {

                if (child.isMesh) {

                    if (status === "run") {
                        child.material.color.set(0x00ff00);
                    }

                    if (status === "stop") {
                        child.material.color.set(0x888888);
                    }

                    if (status === "alarm") {

                        if (alarmBlink) {
                            child.material.color.set(0xff0000); // 红色
                        } else {
                            child.material.color.set(0x000000); // 黑色
                        }

                    }

                }

            });

        }

        // 闪烁定时器
        setInterval(function () {

            if (status === "alarm") {
                alarmBlink = !alarmBlink;
            }

        }, 500);

        // 动画循环函数
        function animate() {

            requestAnimationFrame(animate);

            controls.update();

            // 只旋转叶片
            if (fanParts.length > 0) {
                fanParts.forEach(part => {
                    part.rotation.y += rpm * 0.0001;
                });
            }


            // 更新设备颜色
            updateMachineColor();

            renderer.render(scene, camera);

        }

        animate();

        // 鼠标点击事件处理
        window.addEventListener("click", onMouseClick);

        // 点击检测函数
        function onMouseClick(event) {

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObject(machine, true);

            if (intersects.length > 0) {

                const clicked = intersects[0].object;

                // 恢复之前高亮
                if (selectedObject) {
                    selectedObject.material.color.set(0xffffff);
                }

                // 设置新的高亮
                selectedObject = clicked;
                selectedObject.material.color.set(0xff0000);

                // 更新设备信息
                document.getElementById("deviceName").innerText = "矿井风机";
                document.getElementById("deviceRPM").innerText = rpm;

                if (rpm > 0) {
                    document.getElementById("deviceStatus").innerText = "运行";
                    document.getElementById("temp").innerText = temperature;
                } else {
                    document.getElementById("deviceStatus").innerText = "停止";
                }

            }

        }

        const chart = echarts.init(document.getElementById("trendChart"));

        let chartData = [];

        function updateChart(value) {

            const now = Date.now();

            chartData.push([now, value]);

            if (chartData.length > 20) {
                chartData.shift();
            }

            chart.setOption({
                grid: {
                    left: "1%",
                    right: "10%",
                    top: 20,
                    bottom: 40,
                    containLabel: true
                },

                xAxis: {
                    type: "time",
                    boundaryGap: false,
                    axisLabel: {
                        hideOverlap: true
                    }
                },

                yAxis: {
                    type: "value",
                    min: 0,
                    max: 100
                },

                series: [{
                    type: "line",
                    data: chartData,
                    smooth: true,
                    showSymbol: false,
                    clip: true,
                    lineStyle: {
                        width: 2
                    },
                    areaStyle: {
                        opacity: 0.1
                    }
                }]
            });

        }
    </script>

</body>

</html>
